version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: nymit_postgres_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword123
      POSTGRES_DB: nymit_dev
    ports:
      - "5432:5432"
    volumes:
      - nymit_postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  nymit_postgres_data: